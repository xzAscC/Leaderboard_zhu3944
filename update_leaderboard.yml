name: Update leaderboard

on:
  push:
    paths:
      - "submissions/**.json"   # triggers on any new or updated JSON in submissions/
  workflow_dispatch:             # also allow manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  update-leaderboard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout leaderboard repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - name: Rebuild leaderboard
        env:
          BASELINE_F1:  "0.00"    # update this once you have the baseline score
          GROUND_TRUTH: "ground_truth/public_test_labels.csv"
        run: python scripts/build_leaderboard.py

      - name: Commit updated leaderboard
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add leaderboard.md
          git diff --staged --quiet || git commit -m "Update leaderboard [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
